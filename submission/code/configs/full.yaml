# Reported-scale configuration for the multi-depth spectral-truncation-kernel
# QAOA warm-start benchmark. Graphs stay exact-MaxCut tractable (n<=14) so every
# approximation ratio is ground truth; the benchmark is run at depths p=1,2,3 to
# expose the depth-dependence of the learned-transfer advantage. Runtime is a few
# minutes on a single laptop CPU.
name: full
seed: 0
families: [erdos_renyi, regular, barabasi_albert, watts_strogatz, grid, stochastic_block]
n_per_family: 14
sizes: [8, 10, 12, 14]
budget: 28
target_ratio: 0.95
depths: [1, 2, 3]
headline_depth: 2
stk_r: 6
stk_ridge: 0.01
label_restarts: 1
