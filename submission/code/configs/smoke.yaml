# Smoke / demo configuration: runs in a few seconds on a laptop CPU.
# Numbers from this config are demo-scale (small graphs, few seeds) -- the
# reported-scale numbers come from configs/full.yaml.
name: smoke
seed: 0
families: [erdos_renyi, regular, barabasi_albert, watts_strogatz, grid, stochastic_block]
n_per_family: 3
sizes: [6, 8]
budget: 16
target_ratio: 0.95
depths: [1, 2, 3]
headline_depth: 2
stk_r: 6
stk_ridge: 0.01
label_restarts: 1
